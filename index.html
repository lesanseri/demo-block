// ===================== RENDER HELPERS =====================
function renderCard(c) {
  let tagHtml = c.tag ? `<span class="tag">${c.tag}</span>` : "";
  let deco = c.bg === "#F0EFEA" ? `<div class="deco-circle"></div><div class="search-icon">&#x1F50D;</div>` : "";
  let style = c.bg && c.bg !== "#F0EFEA" ? `style="background:${c.bg}"` : "";
  let titleStyle = c.main.length > 3 ? `style="font-size:36px"` : "";
  let subStyle = c.sub.length > 3 ? `style="font-size:28px"` : "";
  let enStyle = c.en.length > 8 ? `style="font-size:32px;color:${c.enColor}"` : `style="color:${c.enColor}"`;
  return `<div class="theme-card" onclick="openDetail(${c.idx})">
    <div class="cover" ${style}>
      ${deco}
      <div class="title-group">
        <div class="main-title" ${titleStyle}>${c.main}</div>
        <div class="sub-title" ${subStyle}>${c.sub}</div>
        <div class="en-title" ${enStyle}>${c.en}${tagHtml}</div>
      </div>
    </div>
    <div class="card-footer">
      <div class="card-title">${c.title}</div>
      <div class="card-meta">
        <span class="meta-item">🏪 ${c.shops}家店</span>
        <span class="meta-dot"></span>
        ${c.tags.map(t=>`<span class="meta-tag">${t}</span>`).join("")}
        <span class="meta-dot"></span>
        <span class="meta-item">👥 ${c.people}人正在逛</span>
      </div>
      <div class="author"><img class="avatar" src="${c.avatar}" alt=""><span class="name">${c.author}</span></div>
    </div>
  </div>`;
}

function renderShopCard(p, dIdx) {
  return `<div class="shop-card" onclick="openPlace(${dIdx},${districts[dIdx].places.indexOf(p)})">
    <div class="shop-main">
      <div class="shop-img-wrap"><div class="shop-img-deco"></div><img class="shop-img" src="${p.thumb}" alt=""></div>
      <div class="shop-info">
        <div class="shop-header"><div class="shop-name">${p.name}</div><div class="star-btn" onclick="event.stopPropagation();toggleStar(this)"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div></div>
        <div class="shop-meta">${p.type} · 上海 ${p.loc}</div>
        <div class="quote"><img class="quote-avatar" src="${p.qAvatar}" alt=""><div class="quote-text">"${p.quote}"</div></div>
        <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      </div>
    </div>
    <div class="shop-note-recs">
      <div class="rec-label">大家的笔记</div>
      ${p.notes.slice(0,3).map(n=>`<div class="rec-item"><img class="rec-img" src="${n.imgs[0]}" alt=""><div class="rec-text">"${n.text}"</div><div class="rec-likes">❤️ ${n.likes}</div></div>`).join("")}
    </div>
  </div>`;
}

function renderDetail(d) {
  let tagHtml = d.heroTag ? `<span class="tag">${d.heroTag}</span>` : "";
  let deco = d.heroBg === "#F0EFEA" ? `<div class="deco-circle"></div><div class="search-icon">&#x1F50D;</div>` : "";
  let heroStyle = d.heroBg && d.heroBg !== "#F0EFEA" ? `style="background:${d.heroBg}"` : "";
  return `<div class="page-header">
    <div class="back-btn" onclick="switchView('home')"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>
    <div class="page-title">街区详情</div>
  </div>
  <div class="detail-hero" ${heroStyle}>
    ${deco}
    <div class="title-group">
      <div class="main-title" style="font-size:${d.heroMain.length>3?'36px':'42px'}">${d.heroMain}</div>
      <div class="sub-title" style="font-size:${d.heroSub.length>3?'28px':'36px'}">${d.heroSub}</div>
      <div class="en-title" style="font-size:${d.heroEn.length>8?'32px':'48px'};color:${d.heroColor}">${d.heroEn}${tagHtml}</div>
    </div>
  </div>
  <div class="detail-intro">
    <div class="desc">${d.desc}</div>
    <div class="curator-bar">
      <div class="curator-left"><img class="avatar" src="${d.curatorAvatar}" alt=""><div class="info"><div class="name">${d.curator}<span>🛡️</span></div><div class="sub">${d.curatorSub}</div></div></div>
      <button class="follow-btn" id="followBtn${d.idx}" onclick="toggleFollow(${d.idx})">关注</button>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="num">${d.stats.shops}</div><div class="label">${d.idx===2?'目的地':'店铺'}</div></div>
    <div class="divider"></div>
    <div class="stat"><div class="num">${d.stats.events}</div><div class="label">限时体验</div></div>
    <div class="divider"></div>
    <div class="stat"><div class="num">${d.stats.people}</div><div class="label">人正在逛</div></div>
  </div>
  <div class="section-title">${d.idx===2?'周末目的地':'街区店铺'}</div>
  ${d.places.map(p=>renderShopCard(p,d.idx)).join("")}`;
}

// ===================== INIT =====================
function init() {
  // home tabs
  document.getElementById("tabRec").innerHTML = homeCards.rec.map(renderCard).join("");
  document.getElementById("tabHot").innerHTML = homeCards.hot.map(renderCard).join("");
  document.getElementById("tabFlash").innerHTML = homeCards.flash.map(renderCard).join("");
  document.getElementById("tabFollow").innerHTML = homeCards.follow.map(renderCard).join("");

  // detail pages
  districts.forEach(d => {
    document.getElementById("detailView" + d.idx).innerHTML = renderDetail(d);
  });

  // home category switch
  document.querySelectorAll('.category-bar .cat').forEach(cat => {
    cat.addEventListener('click', function() {
      document.querySelectorAll('.category-bar .cat').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('tab' + this.dataset.tab[0].toUpperCase() + this.dataset.tab.slice(1)).classList.add('active');
    });
  });
}

// ===================== NAVIGATION =====================
function switchView(viewName, param) {
  // hide all views
  document.querySelectorAll('.view').forEach(v => {
    v.classList.remove('active');
    v.style.display = '';
  });
  document.getElementById('buyBar').style.display = 'none';
  document.getElementById('bottomTab').style.display = 'flex';

  if (viewName === 'home') {
    document.getElementById('homeView').classList.add('active');
  } else if (viewName === 'detail') {
    document.getElementById('detailView' + param).classList.add('active');
  } else if (viewName === 'place') {
    renderPlaceView(param.d, param.p);
    document.getElementById('placeView').classList.add('active');
  } else if (viewName === 'product') {
    renderProductView();
    document.getElementById('productView').classList.add('active');
    document.getElementById('buyBar').style.display = 'flex';
    document.getElementById('bottomTab').style.display = 'none';
  }
  window.scrollTo(0, 0);
}

let currentDetail = 0;
function openDetail(idx) {
  currentDetail = idx;
  switchView('detail', idx);
}

function openPlace(dIdx, pIdx) {
  switchView('place', {d: dIdx, p: pIdx});
}

function backToDetail() {
  switchView('detail', currentDetail);
}

    <div class="p-tab" onclick="switchPlaceTab('notes')">笔记</div>
    <div class="p-tab" onclick="switchPlaceTab('goods')">商品</div>
  </div>
  <div class="place-content active" id="pv-hot">
    <div class="hot-section">
      <div class="hot-title"><h3>讨论热度</h3><div class="more">全部 ></div></div>
      <div class="hot-tags">${p.hotTags.map(h=>`<span class="h-tag">${h[0]}<span class="count">${h[1]}</span></span>`).join('')}</div>
    </div>
  </div>
  <div class="place-content" id="pv-notes">
    <div class="notes-list">${p.notes.map(n=>`
      <div class="note-item">
        <div class="note-header"><div class="note-user"><img src="${n.avatar}" alt=""><span class="username">${n.user}</span></div><div class="note-likes">❤️ ${n.likes}</div></div>
        <div class="note-text">${n.text}<span class="more">更多 ></span></div>
        <div class="note-imgs">${n.imgs.map((im,i)=>i===n.imgs.length-1&&n.imgs.length>1?`<div class="img-count"><img src="${im}" alt=""><span class="count-badge">共${n.imgs.length}张</span></div>`:`<img src="${im}" alt="">`).join('')}</div>
        <div class="note-footer"><span>${n.date}</span><span>${p.loc}</span></div>
        <div class="note-source">📒 来自笔记：${n.source} ></div>
      </div>`).join('')}
    </div>
  </div>
  <div class="place-content" id="pv-goods">
    <div class="goods-list-place">${p.goods.map(g=>`<div class="goods-card" onclick="openProduct()"><img class="g-img" src="${g.img}" alt=""><div class="g-name">${g.name}</div><div class="g-price">${g.price}</div></div>`).join('')}</div>
  </div>`;
}

function switchPlaceTab(tab) {
  document.querySelectorAll('.place-tabs .p-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.place-content').forEach(c => c.classList.remove('active'));
  const map = {hot:0, notes:1, goods:2};
  document.querySelectorAll('.place-tabs .p-tab')[map[tab]].classList.add('active');
  document.getElementById('pv-' + tab).classList.add('active');
}

function renderProductView() {
  document.getElementById('productView').innerHTML = `
  <div class="page-header">
    <div class="back-btn" onclick="backToPlace()"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>
    <div class="page-title">商品详情</div>
  </div>
  <div class="product-images" style="display:flex;align-items:center;justify-content:center;background:#f8f8f8;">
    <div style="font-size:48px;font-weight:900;color:#999;letter-spacing:4px;">商品详情页</div>
  </div>
  <div class="product-info">
    <div class="product-name">示例商品名称</div>
    <div class="product-price">¥99<span class="original">¥199</span></div>
    <div class="shop-info-bar"><div class="shop-icon" style="width:36px;height:36px;border-radius:8px;background:#e8e8e8;flex-shrink:0;margin-right:10px;"></div><div class="shop-name-text">示例店铺</div><div class="enter-shop">进店 ></div></div>
    <div class="product-desc">这里是商品的通用详情模板，包含材质、尺寸、使用方法等说明。<br><br>购买后你可以回到街区写下真实体验，帮助更多人发现好物。</div>
  </div>`;
}

function openProduct() {
  switchView('product');
}

function backToPlace() {
  document.getElementById('productView').classList.remove('active');
  document.getElementById('placeView').classList.add('active');
  document.getElementById('buyBar').style.display = 'none';
  document.getElementById('bottomTab').style.display = 'flex';
}

function toggleFollow(idx) {
  const btn = document.getElementById('followBtn' + idx);
  btn.classList.toggle('following');
  btn.textContent = btn.classList.contains('following') ? '已关注' : '关注';
}

function toggleStar(el) { el.classList.toggle('active'); }
function toggleLike(el) { el.classList.toggle('active'); }

init();
</script>
</body>
</html>
